# Antarcticom — Docker Compose (Standalone Mode)
#
# Usage: docker compose -f docker/docker-compose.yml up -d
#
# This runs in standalone mode (auth + community, all-in-one).
# RSA keys for JWT signing are auto-generated on first startup
# and persisted in the ./data/keys volume.

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    network_mode: host
    environment:
      - ANTARCTICOM__DATABASE__URL=postgres://antarcticom:antarcticom@127.0.0.1:5432/antarcticom
      - ANTARCTICOM__REDIS__URL=redis://127.0.0.1:6379
      - ANTARCTICOM__LOGGING__LEVEL=info
      # Set this to your VPS's public IP for WebRTC voice to work
      - ANTARCTICOM__VOICE__PUBLIC_IP=${PUBLIC_IP:-}
    volumes:
      - keydata:/app/data/keys # RSA keys (auto-generated on first run)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: antarcticom
      POSTGRES_PASSWORD: antarcticom
      POSTGRES_DB: antarcticom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U antarcticom" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  keydata:
